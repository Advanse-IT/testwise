<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Neural circuit node logomark for Testwise -->
  <!-- Central node -->
  <circle cx="24" cy="24" r="5" fill="#22D3C3"/>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="9" stroke="#22D3C3" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- Connection arms -->
  <line x1="24" y1="15" x2="24" y2="6"  stroke="#22D3C3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="33" x2="24" y2="42" stroke="#22D3C3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="24" x2="6"  y2="24" stroke="#22D3C3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="24" x2="42" y2="24" stroke="#22D3C3" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal arms -->
  <line x1="18" y1="18" x2="10" y2="10" stroke="#22D3C3" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="30" x2="38" y2="38" stroke="#22D3C3" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="18" x2="38" y2="10" stroke="#22D3C3" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="30" x2="10" y2="38" stroke="#22D3C3" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <!-- Outer nodes -->
  <circle cx="24" cy="6"  r="2.5" fill="#22D3C3" opacity="0.8"/>
  <circle cx="24" cy="42" r="2.5" fill="#22D3C3" opacity="0.8"/>
  <circle cx="6"  cy="24" r="2.5" fill="#22D3C3" opacity="0.8"/>
  <circle cx="42" cy="24" r="2.5" fill="#22D3C3" opacity="0.8"/>
  <circle cx="10" cy="10" r="1.8" fill="#22D3C3" opacity="0.45"/>
  <circle cx="38" cy="38" r="1.8" fill="#22D3C3" opacity="0.45"/>
  <circle cx="38" cy="10" r="1.8" fill="#22D3C3" opacity="0.45"/>
  <circle cx="10" cy="38" r="1.8" fill="#22D3C3" opacity="0.45"/>
</svg>
